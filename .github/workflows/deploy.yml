name: Deploy to cPanel

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build (reuse existing artifact)'
        type: boolean
        default: false

concurrency:
  group: deploy-cpanel-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_BIN: /home2/trailgli/nodevenv/trailgliders/24/bin

jobs:
  build:
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure SSH tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Start SSH tunnel to database
        run: |
          ssh -f -N -L 5432:127.0.0.200:5432 \
            -i ~/.ssh/deploy_key \
            -p ${{ secrets.CPANEL_PORT }} \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=15 \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}
          echo "SSH tunnel established (localhost:5432 → cPanel 127.0.0.200:5432)"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push database schema to production
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma db push --accept-data-loss --skip-generate

      - name: Build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npm run build

      - name: Close SSH tunnel
        if: always()
        run: |
          pkill -f "ssh -f -N -L 5432" || true
          rm -f ~/.ssh/deploy_key

      - name: Stage deploy payload
        run: |
          mkdir -p deploy-payload/app
          cp -r .next/standalone/. deploy-payload/app/
          mkdir -p deploy-payload/app/.next
          cp -r .next/static deploy-payload/app/.next/static
          cp -r public deploy-payload/app/public
          mkdir -p deploy-payload/app/prisma
          cp -r prisma/* deploy-payload/app/prisma/ 2>/dev/null || true
          cp -r scripts deploy-payload/app/scripts
          cp package.json deploy-payload/app/
          [ -f package-lock.json ] && cp package-lock.json deploy-payload/app/ || true
          [ -f bun.lock ] && cp bun.lock deploy-payload/app/ || true
          [ -f run.sh ] && cp run.sh deploy-payload/app/ && chmod +x deploy-payload/app/run.sh || true

      - name: Create deploy tarball
        # Include node_modules/@prisma so the runtime Prisma Client + engine
        # binaries are available on cPanel (avoids needing prisma CLI there).
        run: |
          mkdir -p deploy-payload/app/node_modules
          cp -r node_modules/@prisma deploy-payload/app/node_modules/@prisma
          cp -r node_modules/.prisma deploy-payload/app/node_modules/.prisma
          cp -r node_modules/prisma deploy-payload/app/node_modules/prisma
          tar -czf deploy-payload.tar.gz \
            --exclude='node_modules/prisma/build' \
            -C deploy-payload/app .

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-payload
          path: deploy-payload.tar.gz
          retention-days: 7

  deploy:
    needs: [build]
    if: always() && (needs.build.result == 'success' || inputs.skip_build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-payload
          path: ./

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # Write SSH config (no leading whitespace)
          printf '%s\n' \
            "Host cpanel" \
            "  HostName ${{ secrets.CPANEL_HOST }}" \
            "  User ${{ secrets.CPANEL_USER }}" \
            "  Port ${{ secrets.CPANEL_PORT }}" \
            "  IdentityFile ~/.ssh/deploy_key" \
            "  StrictHostKeyChecking accept-new" \
            "  ServerAliveInterval 15" \
            "  ServerAliveCountMax 20" \
            "  ConnectTimeout 30" \
            >> ~/.ssh/config

      - name: Test SSH connection
        run: ssh cpanel "echo 'SSH OK'; whoami"

      - name: Ensure deploy directory exists
        run: ssh cpanel "mkdir -p '${{ secrets.CPANEL_PATH }}'"

      - name: Backup current deployment
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            mkdir -p \$DEPLOY_PATH/backups \$DEPLOY_PATH/logs \$DEPLOY_PATH/tmp
            if [ -f \$DEPLOY_PATH/server.js ]; then
              TS=\$(date +%Y%m%d-%H%M%S)
              tar -czf \$DEPLOY_PATH/backups/rollback-\$TS.tgz \
                -C \$DEPLOY_PATH server.js package.json .next public 2>/dev/null || true
              ls -t \$DEPLOY_PATH/backups/rollback-*.tgz 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true
              echo \"Backup created: rollback-\$TS.tgz\"
            else
              echo 'First deploy — no backup needed'
            fi
          "

      - name: Upload payload
        run: |
          DEPLOY_PATH="${{ secrets.CPANEL_PATH }}"
          SSH_TARGET="${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}"
          scp -i ~/.ssh/deploy_key -P ${{ secrets.CPANEL_PORT }} \
            deploy-payload.tar.gz \
            "${SSH_TARGET}:${DEPLOY_PATH}/deploy-payload.tar.gz"
          echo "Upload complete"

      - name: Preserve existing files
        run: |
          ssh cpanel "
            cd '${{ secrets.CPANEL_PATH }}'
            for d in backups logs uploads tmp; do
              [ -d \$d ] && mv \$d /tmp/tga-preserve-\$d-\$\$ 2>/dev/null || true
            done
            for f in .env .env.local .env.production; do
              [ -f \$f ] && cp \$f /tmp/tga-preserve-\$f-\$\$ 2>/dev/null || true
            done
            rm -rf node_modules 2>/dev/null || true
            echo 'Preserved existing files'
          "

      - name: Extract payload
        run: |
          ssh cpanel "
            cd '${{ secrets.CPANEL_PATH }}'
            tar -xzf deploy-payload.tar.gz
            rm -f deploy-payload.tar.gz
            echo 'Extraction complete'
          "

      - name: Restore preserved files
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            cd \$DEPLOY_PATH
            for d in backups logs uploads tmp; do
              [ -d /tmp/tga-preserve-\$d-\$\$ ] && mv /tmp/tga-preserve-\$d-\$\$ \$DEPLOY_PATH/\$d 2>/dev/null || true
            done
            for f in .env .env.local .env.production; do
              [ -f /tmp/tga-preserve-\$f-\$\$ ] && mv /tmp/tga-preserve-\$f-\$\$ \$DEPLOY_PATH/\$f 2>/dev/null || true
            done
            echo 'Files restored'
            ls node_modules/@prisma 2>/dev/null | head -5
            ls node_modules/.prisma 2>/dev/null | head -5
          "

      - name: Copy static files to public_html
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            PUBLIC_HTML=\"\$(dirname \$DEPLOY_PATH)/public_html\"

            # Next.js static assets (JS/CSS chunks)
            rm -rf \$PUBLIC_HTML/_next/static
            mkdir -p \$PUBLIC_HTML/_next
            cp -r \$DEPLOY_PATH/.next/static \$PUBLIC_HTML/_next/static

            # Public folder (images, favicon, robots.txt, etc.)
            cp -r \$DEPLOY_PATH/public/* \$PUBLIC_HTML/ 2>/dev/null || true

            echo \"Static files copied to \$PUBLIC_HTML\"
          "

      - name: Run post-deploy script
        timeout-minutes: 15
        run: |
          COMMIT="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME}"

          ssh cpanel "
            export PATH=${{ env.NODE_BIN }}:\$PATH
            cd ${{ secrets.CPANEL_PATH }}
            chmod +x scripts/cpanel-post-deploy.sh
            cp scripts/cpanel-post-deploy.sh post-deploy.sh
            chmod +x post-deploy.sh
            ./post-deploy.sh \
              --app-name '${{ secrets.CPANEL_APP_NAME }}' \
              --commit '${COMMIT}' \
              --version '${VERSION}'
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
