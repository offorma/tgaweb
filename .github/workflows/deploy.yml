name: Deploy to cPanel

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build (reuse existing artifact)'
        type: boolean
        default: false

concurrency:
  group: deploy-cpanel-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_BIN: /opt/alt/alt-nodejs22/root/usr/bin

jobs:
  # Unit tests + 95% coverage gate. Blocks build AND deploy if it fails.
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [test]
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Generate the runtime client + query engines for the bundled binaryTargets
      # (incl. the server's debian-openssl-1.0.x). The schema is pushed from the
      # runner via SSH tunnel (see the deploy job) — the server never runs Prisma.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        id: build
        run: npm run build

      - name: Annotate build failure
        if: failure() && steps.build.outcome == 'failure'
        run: echo "::error title=Build failed::next build failed during deploy — see the 'Build' step logs above."

      - name: Stage deploy payload
        run: |
          mkdir -p deploy-payload/app
          cp -r .next/standalone/. deploy-payload/app/
          mkdir -p deploy-payload/app/.next
          cp -r .next/static deploy-payload/app/.next/static
          cp -r public deploy-payload/app/public
          mkdir -p deploy-payload/app/prisma
          cp -r prisma/* deploy-payload/app/prisma/ 2>/dev/null || true
          cp -r scripts deploy-payload/app/scripts
          cp package.json deploy-payload/app/
          [ -f package-lock.json ] && cp package-lock.json deploy-payload/app/ || true
          [ -f bun.lock ] && cp bun.lock deploy-payload/app/ || true
          [ -f run.sh ] && cp run.sh deploy-payload/app/ && chmod +x deploy-payload/app/run.sh || true

      - name: Create deploy tarball
        # The server only needs the RUNTIME Prisma client + query engine — it never
        # runs the Prisma CLI (schema is pushed from the runner via SSH tunnel).
        run: |
          mkdir -p deploy-payload/app/node_modules
          # The Next standalone (copied above) already created node_modules/@prisma
          # and node_modules/.prisma for the runtime client. MERGE into them with a
          # trailing '/.' — `cp -r src dest` nests when dest exists (dest/@prisma/@prisma).
          mkdir -p deploy-payload/app/node_modules/@prisma deploy-payload/app/node_modules/.prisma
          cp -r node_modules/@prisma/client/. deploy-payload/app/node_modules/@prisma/client/ 2>/dev/null || true
          cp -r node_modules/.prisma/.  deploy-payload/app/node_modules/.prisma/
          cp -r node_modules/bcryptjs deploy-payload/app/node_modules/bcryptjs
          # Sanity-check: the server's runtime query engine must be bundled.
          if ! ls deploy-payload/app/node_modules/.prisma/client/libquery_engine-debian-openssl-1.0.x.so.node >/dev/null 2>&1; then
            echo "::error title=Runtime engine missing::libquery_engine-debian-openssl-1.0.x not bundled — the app will 500. Check binaryTargets in schema.prisma."
            exit 1
          fi
          tar -czf deploy-payload.tar.gz \
            -C deploy-payload/app .

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-payload
          path: deploy-payload.tar.gz
          retention-days: 7

  deploy:
    needs: [test, build]
    # Deploy only when tests/coverage passed, and the build succeeded (or was skipped).
    if: always() && needs.test.result == 'success' && (needs.build.result == 'success' || inputs.skip_build)
    runs-on: ubuntu-latest
    steps:
      # Checkout + node so the runner can push the DB schema with its own
      # (complete, correct) Prisma over an SSH tunnel — the server never runs Prisma.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate

      - uses: actions/download-artifact@v4
        with:
          name: deploy-payload
          path: ./

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # Write SSH config (no leading whitespace)
          printf '%s\n' \
            "Host cpanel" \
            "  HostName ${{ secrets.CPANEL_HOST }}" \
            "  User ${{ secrets.CPANEL_USER }}" \
            "  Port ${{ secrets.CPANEL_PORT }}" \
            "  IdentityFile ~/.ssh/deploy_key" \
            "  StrictHostKeyChecking accept-new" \
            "  ServerAliveInterval 15" \
            "  ServerAliveCountMax 20" \
            "  ConnectTimeout 30" \
            >> ~/.ssh/config

      - name: Test SSH connection
        run: ssh cpanel "echo 'SSH OK'; whoami"

      - name: Ensure deploy directory exists
        run: ssh cpanel "mkdir -p '${{ secrets.CPANEL_PATH }}'"

      - name: Backup current deployment
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            mkdir -p \$DEPLOY_PATH/backups \$DEPLOY_PATH/logs \$DEPLOY_PATH/tmp
            if [ -f \$DEPLOY_PATH/server.js ]; then
              TS=\$(date +%Y%m%d-%H%M%S)
              tar -czf \$DEPLOY_PATH/backups/rollback-\$TS.tgz \
                -C \$DEPLOY_PATH server.js package.json .next public 2>/dev/null || true
              ls -t \$DEPLOY_PATH/backups/rollback-*.tgz 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true
              echo \"Backup created: rollback-\$TS.tgz\"
            else
              echo 'First deploy — no backup needed'
            fi
          "

      - name: Upload payload
        run: |
          DEPLOY_PATH="${{ secrets.CPANEL_PATH }}"
          SSH_TARGET="${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}"
          scp -i ~/.ssh/deploy_key -P ${{ secrets.CPANEL_PORT }} \
            deploy-payload.tar.gz \
            "${SSH_TARGET}:${DEPLOY_PATH}/deploy-payload.tar.gz"
          echo "Upload complete"

      - name: Extract & swap release (staged — live app stays up if extract fails)
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            cd \$DEPLOY_PATH || exit 1
            TARBALL=deploy-payload.tar.gz
            # App files come from the tarball and get swapped. Everything else
            # (.env, backups, logs, uploads, tmp, wrapper-server.js) is preserved
            # simply by never touching it.
            APP_ITEMS='.next node_modules server.js package.json package-lock.json bun.lock run.sh prisma scripts public'

            # ── 1) Integrity check (a truncated SCP also yields exit 255) ──
            echo 'Verifying tarball...'
            gzip -t \$TARBALL || { echo 'ERROR: tarball is corrupt/truncated (gzip -t failed).'; exit 1; }
            tar -tzf \$TARBALL >/dev/null 2>&1 || { echo 'ERROR: tarball listing failed.'; exit 1; }

            # ── 2) Free space: prune old artifacts, then require ~3x the tarball ──
            ls -t backups/rollback-*.tgz 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true
            rm -rf .deploy-new-* .deploy-old-* 2>/dev/null || true
            TB=\$(stat -c%s \$TARBALL 2>/dev/null || echo 0)
            AVAIL=\$(df -kP . | awk 'NR==2{print \$4*1024}')
            echo \"tarball=\$TB bytes, free=\$AVAIL bytes\"
            if [ \"\$TB\" -gt 0 ] && [ \"\$AVAIL\" -lt \$((TB * 3)) ]; then
              echo 'ERROR: not enough free disk to extract safely (need ~3x the tarball). Free space in cPanel and retry.'; exit 1
            fi

            # ── 3) Extract to a STAGING dir — the live app is untouched if this fails ──
            NEW=\$DEPLOY_PATH/.deploy-new-\$\$
            mkdir -p \$NEW
            extracted=0
            for attempt in 1 2 3; do
              if tar -xzf \$TARBALL -C \$NEW; then extracted=1; break; fi
              echo \"extract attempt \$attempt failed; retrying...\"; sleep 5
            done
            if [ \"\$extracted\" != 1 ] || [ ! -f \$NEW/server.js ]; then
              echo 'ERROR: staged extraction failed — LIVE APP LEFT UNTOUCHED.'
              rm -rf \$NEW; exit 1
            fi
            echo 'Staged extraction OK'

            # ── 4) Swap new release in (fast renames within the same filesystem) ──
            OLD=\$DEPLOY_PATH/.deploy-old-\$\$
            mkdir -p \$OLD
            for item in \$APP_ITEMS; do
              [ -e \$DEPLOY_PATH/\$item ] && mv \$DEPLOY_PATH/\$item \$OLD/\$item 2>/dev/null || true
            done
            swap_ok=1
            for item in \$APP_ITEMS; do
              if [ -e \$NEW/\$item ]; then mv \$NEW/\$item \$DEPLOY_PATH/\$item || swap_ok=0; fi
            done

            # ── 5) Restore-on-failure: roll the previous release back into place ──
            if [ \"\$swap_ok\" != 1 ] || [ ! -f \$DEPLOY_PATH/server.js ]; then
              echo 'ERROR: swap failed — restoring previous release so the site stays up.'
              for item in \$APP_ITEMS; do
                rm -rf \$DEPLOY_PATH/\$item 2>/dev/null || true
                [ -e \$OLD/\$item ] && mv \$OLD/\$item \$DEPLOY_PATH/\$item 2>/dev/null || true
              done
              rm -rf \$NEW \$OLD; exit 1
            fi

            # ── 6) Success — clean up ──
            rm -rf \$NEW \$OLD
            rm -f \$TARBALL
            echo 'Release swapped in (preserved: .env, backups, logs, uploads, tmp, wrapper-server.js)'
            ls -d node_modules/@prisma/engines >/dev/null 2>&1 && echo '@prisma/engines present ✓' || echo 'WARN: @prisma/engines missing'
          "

      - name: Copy static files to public_html
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            APP_NAME=\$(basename \$DEPLOY_PATH)
            PUBLIC_HTML=\"\$(dirname \$DEPLOY_PATH)/public_html/\$APP_NAME\"
            mkdir -p \$PUBLIC_HTML/_next

            # Next.js static assets (JS/CSS chunks)
            rm -rf \$PUBLIC_HTML/_next/static
            cp -r \$DEPLOY_PATH/.next/static \$PUBLIC_HTML/_next/static

            # Public folder (images, favicon, robots.txt, etc.)
            cp -r \$DEPLOY_PATH/public/* \$PUBLIC_HTML/ 2>/dev/null || true

            echo \"Static files copied to \$PUBLIC_HTML\"
          "

      - name: Push database schema (from runner via SSH tunnel)
        run: |
          # The runner has a complete, working Prisma; the cPanel server does not.
          # Forward runner:5433 -> the prod Postgres (reachable only from the server),
          # then push the schema from here. The server never runs Prisma.
          set -e
          PROD_URL='${{ secrets.PROD_DATABASE_URL }}'
          [ -n "$PROD_URL" ] || { echo "::error title=Missing secret::PROD_DATABASE_URL is empty — set it in the repo secrets."; exit 1; }
          DBHOST=$(node -e "process.stdout.write(new URL(process.argv[1]).hostname)" "$PROD_URL")
          DBPORT=$(node -e "const u=new URL(process.argv[1]);process.stdout.write(u.port||'5432')" "$PROD_URL")
          ssh -fN -o ExitOnForwardFailure=yes -L 5433:"$DBHOST":"$DBPORT" cpanel
          TUNNEL_URL=$(node -e "const u=new URL(process.argv[1]);u.hostname='127.0.0.1';u.port='5433';process.stdout.write(u.toString())" "$PROD_URL")
          if DATABASE_URL="$TUNNEL_URL" npx prisma db push --skip-generate --accept-data-loss; then
            echo 'Database schema pushed via SSH tunnel'
          else
            echo '::error title=DB schema push failed::prisma db push (via SSH tunnel) failed — the schema is NOT up to date. The app will 500 on missing tables.'
            exit 1
          fi

      - name: Run post-deploy script
        timeout-minutes: 15
        run: |
          COMMIT="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME}"

          ssh cpanel "
            export PATH=${{ env.NODE_BIN }}:\$PATH
            cd ${{ secrets.CPANEL_PATH }}
            chmod +x scripts/cpanel-post-deploy.sh
            cp scripts/cpanel-post-deploy.sh post-deploy.sh
            chmod +x post-deploy.sh
            ./post-deploy.sh \
              --app-name '${{ secrets.CPANEL_APP_NAME }}' \
              --commit '${COMMIT}' \
              --version '${VERSION}'
          "

      - name: Collect remote logs on failure
        if: failure()
        run: |
          echo "::error title=Deployment failed::A deploy step failed — collecting cPanel logs below."
          if [ -f ~/.ssh/deploy_key ]; then
            ssh cpanel "
              DP='${{ secrets.CPANEL_PATH }}'
              echo '===== app / post-deploy logs (\$DP/logs) ====='
              tail -n 200 \$DP/logs/*.log 2>/dev/null || echo '(no logs found in '\$DP'/logs)'
              echo '===== passenger / stderr ====='
              tail -n 200 ~/logs/*.log 2>/dev/null || true
              tail -n 200 \$DP/stderr.log 2>/dev/null || true
              echo '===== prisma client present? ====='
              ls \$DP/node_modules/.prisma 2>/dev/null || echo '(.prisma missing)'
            " || echo "::warning::Could not reach the server to collect logs (SSH likely failed before setup)."
          else
            echo "::warning::SSH key was not configured — failure occurred before the deploy stage (e.g. artifact download)."
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

