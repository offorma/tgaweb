name: Deploy to cPanel

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build (reuse existing artifact)'
        type: boolean
        default: false

concurrency:
  group: deploy-cpanel-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_BIN: /opt/alt/alt-nodejs22/root/usr/bin

jobs:
  # Unit tests + 95% coverage gate. Blocks build AND deploy if it fails.
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [test]
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The cPanel server runs OpenSSL 1.1.1k → it needs debian-openssl-1.1.x
      # engines. `prisma generate` only fetches the QUERY engine; force the
      # SCHEMA engine (used by the on-server `db push`) to download for this
      # target too, otherwise the schema is silently never applied and the app
      # 500s on missing tables.
      - name: Generate Prisma client + bundle schema engine
        env:
          PRISMA_CLI_BINARY_TARGETS: debian-openssl-1.1.x,debian-openssl-3.0.x
        run: |
          npx prisma generate
          # Exercise the schema engine so the CLI downloads it for the targets above.
          npx prisma migrate diff --from-empty \
            --to-schema-datamodel prisma/schema.prisma --script >/dev/null 2>&1 || true
          echo "Engines in node_modules/@prisma/engines:"
          ls -1 node_modules/@prisma/engines/ | grep -iE 'schema-engine|libquery' || true
          if ! ls node_modules/@prisma/engines/schema-engine-debian-openssl-1.1.x >/dev/null 2>&1; then
            echo "::error title=Schema engine missing::schema-engine-debian-openssl-1.1.x was not fetched — the cPanel server (OpenSSL 1.1) cannot run 'prisma db push'. Aborting build."
            exit 1
          fi

      - name: Build
        id: build
        run: npm run build

      - name: Annotate build failure
        if: failure() && steps.build.outcome == 'failure'
        run: echo "::error title=Build failed::next build failed during deploy — see the 'Build' step logs above."

      - name: Stage deploy payload
        run: |
          mkdir -p deploy-payload/app
          cp -r .next/standalone/. deploy-payload/app/
          mkdir -p deploy-payload/app/.next
          cp -r .next/static deploy-payload/app/.next/static
          cp -r public deploy-payload/app/public
          mkdir -p deploy-payload/app/prisma
          cp -r prisma/* deploy-payload/app/prisma/ 2>/dev/null || true
          cp -r scripts deploy-payload/app/scripts
          cp package.json deploy-payload/app/
          [ -f package-lock.json ] && cp package-lock.json deploy-payload/app/ || true
          [ -f bun.lock ] && cp bun.lock deploy-payload/app/ || true
          [ -f run.sh ] && cp run.sh deploy-payload/app/ && chmod +x deploy-payload/app/run.sh || true

      - name: Create deploy tarball
        # Include node_modules/@prisma so the runtime Prisma Client + engine
        # binaries are available on cPanel (avoids needing prisma CLI there).
        run: |
          mkdir -p deploy-payload/app/node_modules
          # IMPORTANT: the Next standalone build (copied above) already created
          # node_modules/@prisma (and .prisma) for the runtime client. Copy with a
          # trailing '/.' to MERGE contents into those dirs — `cp -r src dest` when
          # dest exists nests it (dest/@prisma/@prisma), hiding @prisma/engines from
          # the CLI and duplicating ~200MB of engine binaries.
          mkdir -p deploy-payload/app/node_modules/@prisma deploy-payload/app/node_modules/.prisma
          cp -r node_modules/@prisma/. deploy-payload/app/node_modules/@prisma/
          cp -r node_modules/.prisma/.  deploy-payload/app/node_modules/.prisma/
          cp -r node_modules/prisma deploy-payload/app/node_modules/prisma
          cp -r node_modules/bcryptjs deploy-payload/app/node_modules/bcryptjs
          # Sanity-check: the CLI must be able to resolve @prisma/engines (no nesting)
          if [ ! -f deploy-payload/app/node_modules/@prisma/engines/package.json ]; then
            echo "::error title=Bad Prisma bundle::@prisma/engines is not at node_modules/@prisma/engines (nesting?). The on-server CLI would crash."
            exit 1
          fi
          ls deploy-payload/app/node_modules/@prisma/engines/schema-engine-debian-openssl-1.1.x >/dev/null 2>&1 \
            || echo "::warning title=Engine target::schema-engine-debian-openssl-1.1.x not bundled — the cPanel server (OpenSSL 1.1) may fail db push."
          # NOTE: do NOT exclude node_modules/prisma/build — the Prisma CLI lives
          # there and the on-server `prisma db push` needs it.
          tar -czf deploy-payload.tar.gz \
            -C deploy-payload/app .

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-payload
          path: deploy-payload.tar.gz
          retention-days: 7

  deploy:
    needs: [test, build]
    # Deploy only when tests/coverage passed, and the build succeeded (or was skipped).
    if: always() && needs.test.result == 'success' && (needs.build.result == 'success' || inputs.skip_build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-payload
          path: ./

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # Write SSH config (no leading whitespace)
          printf '%s\n' \
            "Host cpanel" \
            "  HostName ${{ secrets.CPANEL_HOST }}" \
            "  User ${{ secrets.CPANEL_USER }}" \
            "  Port ${{ secrets.CPANEL_PORT }}" \
            "  IdentityFile ~/.ssh/deploy_key" \
            "  StrictHostKeyChecking accept-new" \
            "  ServerAliveInterval 15" \
            "  ServerAliveCountMax 20" \
            "  ConnectTimeout 30" \
            >> ~/.ssh/config

      - name: Test SSH connection
        run: ssh cpanel "echo 'SSH OK'; whoami"

      - name: Ensure deploy directory exists
        run: ssh cpanel "mkdir -p '${{ secrets.CPANEL_PATH }}'"

      - name: Backup current deployment
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            mkdir -p \$DEPLOY_PATH/backups \$DEPLOY_PATH/logs \$DEPLOY_PATH/tmp
            if [ -f \$DEPLOY_PATH/server.js ]; then
              TS=\$(date +%Y%m%d-%H%M%S)
              tar -czf \$DEPLOY_PATH/backups/rollback-\$TS.tgz \
                -C \$DEPLOY_PATH server.js package.json .next public 2>/dev/null || true
              ls -t \$DEPLOY_PATH/backups/rollback-*.tgz 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true
              echo \"Backup created: rollback-\$TS.tgz\"
            else
              echo 'First deploy — no backup needed'
            fi
          "

      - name: Upload payload
        run: |
          DEPLOY_PATH="${{ secrets.CPANEL_PATH }}"
          SSH_TARGET="${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}"
          scp -i ~/.ssh/deploy_key -P ${{ secrets.CPANEL_PORT }} \
            deploy-payload.tar.gz \
            "${SSH_TARGET}:${DEPLOY_PATH}/deploy-payload.tar.gz"
          echo "Upload complete"

      - name: Extract payload (preserving backups, logs, uploads, .env)
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            cd \$DEPLOY_PATH
            PRESERVE_DIR=/tmp/tga-preserve-\$\$

            # ── Preserve existing files ──
            mkdir -p \$PRESERVE_DIR
            for d in backups logs uploads tmp; do
              [ -d \$d ] && mv \$d \$PRESERVE_DIR/\$d 2>/dev/null || true
            done
            for f in .env .env.local .env.production; do
              [ -f \$f ] && cp \$f \$PRESERVE_DIR/\$f 2>/dev/null || true
            done
            echo 'Preserved existing files'

            # ── Clean old deploy files (preserved dirs are safe in /tmp) ──
            rm -rf .next node_modules server.js package.json package-lock.json bun.lock run.sh prisma scripts public 2>/dev/null || true
            echo 'Cleaned old deploy files'

            # ── Extract new payload (retry: large payloads occasionally get the
            #    SSH session killed by the account's resource limits mid-extract) ──
            extracted=0
            for attempt in 1 2 3; do
              if tar -xzf deploy-payload.tar.gz; then extracted=1; break; fi
              echo \"tar extract attempt \$attempt failed; retrying...\"; sleep 5
            done
            if [ \"\$extracted\" != 1 ]; then echo 'ERROR: extraction failed after retries'; exit 1; fi
            rm -f deploy-payload.tar.gz
            echo 'Extraction complete'

            # ── Restore preserved files ──
            for d in backups logs uploads tmp; do
              [ -d \$PRESERVE_DIR/\$d ] && mv \$PRESERVE_DIR/\$d \$DEPLOY_PATH/\$d 2>/dev/null || true
            done
            for f in .env .env.local .env.production; do
              [ -f \$PRESERVE_DIR/\$f ] && mv \$PRESERVE_DIR/\$f \$DEPLOY_PATH/\$f 2>/dev/null || true
            done
            rm -rf \$PRESERVE_DIR 2>/dev/null || true
            echo 'Files restored'
            ls node_modules/@prisma 2>/dev/null | head -5
            ls node_modules/.prisma 2>/dev/null | head -5
          "

      - name: Copy static files to public_html
        run: |
          ssh cpanel "
            DEPLOY_PATH='${{ secrets.CPANEL_PATH }}'
            APP_NAME=\$(basename \$DEPLOY_PATH)
            PUBLIC_HTML=\"\$(dirname \$DEPLOY_PATH)/public_html/\$APP_NAME\"
            mkdir -p \$PUBLIC_HTML/_next

            # Next.js static assets (JS/CSS chunks)
            rm -rf \$PUBLIC_HTML/_next/static
            cp -r \$DEPLOY_PATH/.next/static \$PUBLIC_HTML/_next/static

            # Public folder (images, favicon, robots.txt, etc.)
            cp -r \$DEPLOY_PATH/public/* \$PUBLIC_HTML/ 2>/dev/null || true

            echo \"Static files copied to \$PUBLIC_HTML\"
          "

      - name: Push database schema
        run: |
          # Run the bundled Prisma CLI directly (node_modules/prisma/build) — the
          # server has no network for `npx` to fetch Prisma, and the schema engine
          # is now bundled in the tarball.
          ssh cpanel "
            export PATH=${{ env.NODE_BIN }}:\$PATH
            cd '${{ secrets.CPANEL_PATH }}'
            export DATABASE_URL='${{ secrets.PROD_DATABASE_URL }}'
            node node_modules/prisma/build/index.js db push --accept-data-loss --skip-generate
            echo 'Database schema pushed'
          " || { echo '::error title=DB schema push failed::prisma db push failed on the server — the database schema is NOT up to date. The app will 500 on missing tables. See logs above.'; exit 1; }

      - name: Run post-deploy script
        timeout-minutes: 15
        run: |
          COMMIT="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME}"

          ssh cpanel "
            export PATH=${{ env.NODE_BIN }}:\$PATH
            cd ${{ secrets.CPANEL_PATH }}
            chmod +x scripts/cpanel-post-deploy.sh
            cp scripts/cpanel-post-deploy.sh post-deploy.sh
            chmod +x post-deploy.sh
            ./post-deploy.sh \
              --app-name '${{ secrets.CPANEL_APP_NAME }}' \
              --commit '${COMMIT}' \
              --version '${VERSION}'
          "

      - name: Collect remote logs on failure
        if: failure()
        run: |
          echo "::error title=Deployment failed::A deploy step failed — collecting cPanel logs below."
          if [ -f ~/.ssh/deploy_key ]; then
            ssh cpanel "
              DP='${{ secrets.CPANEL_PATH }}'
              echo '===== app / post-deploy logs (\$DP/logs) ====='
              tail -n 200 \$DP/logs/*.log 2>/dev/null || echo '(no logs found in '\$DP'/logs)'
              echo '===== passenger / stderr ====='
              tail -n 200 ~/logs/*.log 2>/dev/null || true
              tail -n 200 \$DP/stderr.log 2>/dev/null || true
              echo '===== prisma client present? ====='
              ls \$DP/node_modules/.prisma 2>/dev/null || echo '(.prisma missing)'
            " || echo "::warning::Could not reach the server to collect logs (SSH likely failed before setup)."
          else
            echo "::warning::SSH key was not configured — failure occurred before the deploy stage (e.g. artifact download)."
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
