name: PR Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches-ignore: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure SSH tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Start SSH tunnel to database
        run: |
          ssh -f -N -L 5432:127.0.0.200:5432 \
            -i ~/.ssh/deploy_key \
            -p ${{ secrets.CPANEL_PORT }} \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=15 \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}
          echo "SSH tunnel established (localhost:5432 → cPanel 127.0.0.200:5432)"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Close SSH tunnel
        if: always()
        run: |
          pkill -f "ssh -f -N -L 5432" || true
          rm -f ~/.ssh/deploy_key
