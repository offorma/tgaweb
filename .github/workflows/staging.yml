name: Deploy to Staging

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

concurrency:
  group: staging-deploy-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_BIN: /opt/alt/alt-nodejs22/root/usr/bin

jobs:
  # Unit tests + 95% coverage gate. Blocks the staging build/deploy if it fails.
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Generate the runtime client + query engines (incl. debian-openssl-1.0.x for
      # the server). Schema is pushed from the runner via SSH tunnel — the server
      # never runs Prisma. See deploy.yml for details.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        id: build
        run: npm run build

      - name: Annotate build failure
        if: failure() && steps.build.outcome == 'failure'
        run: echo "::error title=Build failed::next build failed during staging — see the 'Build' step logs above."

      - name: Create deploy tarball
        run: |
          mkdir -p deploy-payload/app
          cp -r .next/standalone/. deploy-payload/app/
          mkdir -p deploy-payload/app/.next
          cp -r .next/static deploy-payload/app/.next/static
          cp -r public deploy-payload/app/public
          mkdir -p deploy-payload/app/prisma
          cp -r prisma/* deploy-payload/app/prisma/ 2>/dev/null || true
          cp -r scripts deploy-payload/app/scripts
          cp package.json deploy-payload/app/
          [ -f package-lock.json ] && cp package-lock.json deploy-payload/app/ || true
          [ -f bun.lock ] && cp bun.lock deploy-payload/app/ || true
          [ -f run.sh ] && cp run.sh deploy-payload/app/ && chmod +x deploy-payload/app/run.sh || true
          # Runtime client + query engine only — the server never runs the Prisma CLI
          # (schema is pushed from the runner via SSH tunnel). MERGE with trailing '/.'.
          mkdir -p deploy-payload/app/node_modules/@prisma deploy-payload/app/node_modules/.prisma
          cp -r node_modules/@prisma/client/. deploy-payload/app/node_modules/@prisma/client/ 2>/dev/null || true
          cp -r node_modules/.prisma/.  deploy-payload/app/node_modules/.prisma/
          cp -r node_modules/bcryptjs deploy-payload/app/node_modules/bcryptjs
          if ! ls deploy-payload/app/node_modules/.prisma/client/libquery_engine-debian-openssl-1.0.x.so.node >/dev/null 2>&1; then
            echo "::error title=Runtime engine missing::libquery_engine-debian-openssl-1.0.x not bundled — check binaryTargets."
            exit 1
          fi
          tar -czf deploy-payload.tar.gz \
            -C deploy-payload/app .

      - uses: actions/upload-artifact@v4
        with:
          name: staging-payload
          path: deploy-payload.tar.gz
          retention-days: 3

  deploy-staging:
    needs: [build]
    if: vars.STAGING_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # Checkout + node so the runner can push the DB schema with its own Prisma
      # over an SSH tunnel — staging's server never runs Prisma.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate

      - uses: actions/download-artifact@v4
        with:
          name: staging-payload
          path: ./

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          SSH_KEY="${{ secrets.STAGING_CPANEL_SSH_KEY }}"
          [ -z "$SSH_KEY" ] && SSH_KEY="${{ secrets.CPANEL_SSH_KEY }}"
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          STAGING_HOST="${{ secrets.STAGING_CPANEL_HOST }}"
          [ -z "$STAGING_HOST" ] && STAGING_HOST="${{ secrets.CPANEL_HOST }}"
          STAGING_PORT="${{ secrets.STAGING_CPANEL_PORT }}"
          [ -z "$STAGING_PORT" ] && STAGING_PORT="${{ secrets.CPANEL_PORT }}"
          STAGING_USER="${{ secrets.STAGING_CPANEL_USER }}"
          [ -z "$STAGING_USER" ] && STAGING_USER="${{ secrets.CPANEL_USER }}"

          ssh-keyscan -H -p ${STAGING_PORT} ${STAGING_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

          printf '%s\n' \
            "Host staging" \
            "  HostName ${STAGING_HOST}" \
            "  User ${STAGING_USER}" \
            "  Port ${STAGING_PORT}" \
            "  IdentityFile ~/.ssh/deploy_key" \
            "  StrictHostKeyChecking accept-new" \
            "  ServerAliveInterval 15" \
            "  ServerAliveCountMax 20" \
            "  ConnectTimeout 30" \
            >> ~/.ssh/config

      - name: Test SSH connection
        run: ssh staging "echo 'SSH OK'; whoami"

      - name: Upload and extract payload
        run: |
          STAGING_PATH="${{ secrets.STAGING_CPANEL_PATH }}"
          STAGING_USER="${{ secrets.STAGING_CPANEL_USER }}"
          [ -z "$STAGING_USER" ] && STAGING_USER="${{ secrets.CPANEL_USER }}"
          STAGING_HOST="${{ secrets.STAGING_CPANEL_HOST }}"
          [ -z "$STAGING_HOST" ] && STAGING_HOST="${{ secrets.CPANEL_HOST }}"
          STAGING_PORT="${{ secrets.STAGING_CPANEL_PORT }}"
          [ -z "$STAGING_PORT" ] && STAGING_PORT="${{ secrets.CPANEL_PORT }}"

          # Ensure staging directory exists
          ssh staging "mkdir -p ${STAGING_PATH}/backups ${STAGING_PATH}/logs ${STAGING_PATH}/tmp"

          # Upload tarball
          scp -i ~/.ssh/deploy_key -P ${STAGING_PORT} \
            deploy-payload.tar.gz \
            "${STAGING_USER}@${STAGING_HOST}:${STAGING_PATH}/deploy-payload.tar.gz"

          # Stage-then-swap: extract to a staging dir and atomically swap in, so a
          # failed extraction never takes down the live app. .env/backups/logs/
          # uploads/tmp/wrapper-server.js are preserved by never touching them.
          # Retry at the SSH-session level (LVE resource limits can kill it: exit 255).
          set +e
          ok=0
          for ssh_attempt in 1 2 3 4 5; do
            echo "── Staging extract attempt $ssh_attempt ──"
            ssh staging "
            DEPLOY_PATH='${STAGING_PATH}'
            cd \$DEPLOY_PATH || exit 1
            TARBALL=deploy-payload.tar.gz
            APP_ITEMS='.next node_modules server.js package.json package-lock.json bun.lock run.sh prisma scripts public'

            gzip -t \$TARBALL || { echo 'ERROR: tarball corrupt/truncated.'; exit 1; }
            tar -tzf \$TARBALL >/dev/null 2>&1 || { echo 'ERROR: tarball listing failed.'; exit 1; }

            ls -t backups/rollback-*.tgz 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true
            rm -rf .deploy-new-* .deploy-old-* 2>/dev/null || true
            TB=\$(stat -c%s \$TARBALL 2>/dev/null || echo 0)
            AVAIL=\$(df -kP . | awk 'NR==2{print \$4*1024}')
            echo \"tarball=\$TB bytes, free=\$AVAIL bytes\"
            if [ \"\$TB\" -gt 0 ] && [ \"\$AVAIL\" -lt \$((TB * 3)) ]; then
              echo 'ERROR: not enough free disk to extract safely.'; exit 1
            fi

            NEW=\$DEPLOY_PATH/.deploy-new-\$\$
            mkdir -p \$NEW
            extracted=0
            for attempt in 1 2 3; do
              if tar -xzf \$TARBALL -C \$NEW; then extracted=1; break; fi
              echo \"extract attempt \$attempt failed; retrying...\"; sleep 5
            done
            if [ \"\$extracted\" != 1 ] || [ ! -f \$NEW/server.js ]; then
              echo 'ERROR: staged extraction failed — live app untouched.'; rm -rf \$NEW; exit 1
            fi

            OLD=\$DEPLOY_PATH/.deploy-old-\$\$
            mkdir -p \$OLD
            for item in \$APP_ITEMS; do
              [ -e \$DEPLOY_PATH/\$item ] && mv \$DEPLOY_PATH/\$item \$OLD/\$item 2>/dev/null || true
            done
            swap_ok=1
            for item in \$APP_ITEMS; do
              if [ -e \$NEW/\$item ]; then mv \$NEW/\$item \$DEPLOY_PATH/\$item || swap_ok=0; fi
            done
            if [ \"\$swap_ok\" != 1 ] || [ ! -f \$DEPLOY_PATH/server.js ]; then
              echo 'ERROR: swap failed — restoring previous release.'
              for item in \$APP_ITEMS; do
                rm -rf \$DEPLOY_PATH/\$item 2>/dev/null || true
                [ -e \$OLD/\$item ] && mv \$OLD/\$item \$DEPLOY_PATH/\$item 2>/dev/null || true
              done
              rm -rf \$NEW \$OLD; exit 1
            fi
            rm -rf \$NEW \$OLD; rm -f \$TARBALL
            echo 'Staging release swapped in'
            "
            rc=$?
            [ $rc -eq 0 ] && { ok=1; break; }
            echo "Staging extract SSH exited $rc — resource limit likely killed the session; retrying in 20s..."
            sleep 20
          done
          [ $ok -eq 1 ] || { echo "::error title=Staging extract failed::SSH session killed repeatedly (LVE resource limit). Live app untouched."; exit 1; }

      - name: Copy static files to public_html
        run: |
          ssh staging "
            STAGING_PATH='${{ secrets.STAGING_CPANEL_PATH }}'
            APP_NAME=\$(basename \$STAGING_PATH)
            PUBLIC_HTML=\"\$(dirname \$STAGING_PATH)/public_html/\$APP_NAME\"
            mkdir -p \$PUBLIC_HTML/_next

            # Next.js static assets (JS/CSS chunks)
            rm -rf \$PUBLIC_HTML/_next/static
            cp -r \$STAGING_PATH/.next/static \$PUBLIC_HTML/_next/static

            # Public folder (images, favicon, robots.txt, etc.)
            cp -r \$STAGING_PATH/public/* \$PUBLIC_HTML/ 2>/dev/null || true

            echo \"Static files copied to \$PUBLIC_HTML\"
          "

      - name: Push database schema to staging (from runner via SSH tunnel)
        if: vars.STAGING_ENABLED == 'true'
        run: |
          # Push from the runner's Prisma over an SSH tunnel — staging never runs Prisma.
          set -e
          PROD_URL='${{ secrets.STAGING_DATABASE_URL }}'
          [ -n "$PROD_URL" ] || { echo "::error title=Missing secret::STAGING_DATABASE_URL is empty — set it in the repo secrets."; exit 1; }
          DBHOST=$(node -e "process.stdout.write(new URL(process.argv[1]).hostname)" "$PROD_URL")
          DBPORT=$(node -e "const u=new URL(process.argv[1]);process.stdout.write(u.port||'5432')" "$PROD_URL")
          ssh -fN -o ExitOnForwardFailure=yes -L 5433:"$DBHOST":"$DBPORT" staging
          TUNNEL_URL=$(node -e "const u=new URL(process.argv[1]);u.hostname='127.0.0.1';u.port='5433';process.stdout.write(u.toString())" "$PROD_URL")
          if DATABASE_URL="$TUNNEL_URL" npx prisma db push --skip-generate --accept-data-loss; then
            echo 'Staging database schema pushed via SSH tunnel'
          else
            echo '::error title=Staging DB schema push failed::prisma db push (via SSH tunnel) failed — schema is NOT up to date.'
            exit 1
          fi

      - name: Run post-deploy script
        timeout-minutes: 15
        run: |
          COMMIT="${GITHUB_SHA::7}"
          BRANCH="${{ github.head_ref || github.ref_name }}"

          ssh staging "
            export PATH=${{ env.NODE_BIN }}:\$PATH
            cd '${{ secrets.STAGING_CPANEL_PATH }}'
            chmod +x scripts/cpanel-post-deploy.sh
            cp scripts/cpanel-post-deploy.sh post-deploy.sh
            chmod +x post-deploy.sh
            ./post-deploy.sh \
              --app-name '${{ secrets.STAGING_CPANEL_APP_NAME }}' \
              --commit '${COMMIT}' \
              --version 'staging-${BRANCH}'
          "

      - name: Comment PR with staging URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### 🚀 Staging deployed

            **Branch:** \`${{ github.head_ref }}\`
            **Commit:** \`${context.sha.substring(0, 7)}\`
            **URL:** ${{ secrets.STAGING_NEXTAUTH_URL || 'https://staging.trailglidersacademy.com.ng' }}

            The staging environment has been updated with this PR's changes.`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Staging deployed')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Collect remote logs on failure
        if: failure()
        run: |
          echo "::error title=Staging deploy failed::A staging step failed — collecting logs below."
          if [ -f ~/.ssh/deploy_key ]; then
            ssh staging "
              SP='${{ secrets.STAGING_CPANEL_PATH }}'
              echo '===== app / post-deploy logs (\$SP/logs) ====='
              tail -n 200 \$SP/logs/*.log 2>/dev/null || echo '(no logs found in '\$SP'/logs)'
              echo '===== passenger / stderr ====='
              tail -n 200 ~/logs/*.log 2>/dev/null || true
              tail -n 200 \$SP/stderr.log 2>/dev/null || true
            " || echo "::warning::Could not reach staging server to collect logs."
          else
            echo "::warning::SSH key not configured — failure occurred before the deploy stage."
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  skip-notice:
    needs: [build]
    if: vars.STAGING_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Staging deploy skipped — set STAGING_ENABLED=true in repo variables to enable."
