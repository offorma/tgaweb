name: Tests & Coverage

# Reusable: called by pr-check / deploy / staging so coverage gates every build.
# Also runnable on its own via the Actions tab (manual dispatch).
on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: Unit tests + 95% coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # ── Backend (Vitest) ───────────────────────────────────────────────
      - name: Backend unit tests + coverage (Vitest)
        id: vitest
        run: npm run test:cov

      - name: Annotate backend test failure
        if: failure() && steps.vitest.outcome == 'failure'
        run: echo "::error title=Backend tests failed::Vitest unit tests failed — see the 'Backend unit tests + coverage (Vitest)' step logs above."

      # ── UI (Cypress component tests). The action sets up the browser,
      #     xvfb and binary cache; CYPRESS_COVERAGE=true instruments the source. ──
      - name: UI component tests + coverage (Cypress)
        id: cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          component: true
        env:
          CYPRESS_COVERAGE: 'true'

      - name: Annotate UI test failure
        if: failure() && steps.cypress.outcome == 'failure'
        run: echo "::error title=UI component tests failed::Cypress component tests failed — see the 'UI component tests + coverage (Cypress)' step logs above."

      # ── Merge both reports and FAIL if < 95% (emits a ::error:: annotation) ──
      - name: Enforce 95% coverage gate
        run: npm run coverage:check

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/merged
          retention-days: 7

      # Surface Cypress screenshots when a UI test fails, for debugging.
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore
